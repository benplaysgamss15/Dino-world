function noise(x,y){
return Math.sin(x*0.31)*Math.cos(y*0.29)
+ Math.sin(x*0.73+y*0.41)*0.5
+ Math.cos(x*0.17-y*0.23)*0.8
+ Math.sin((x+y)*0.11)*0.3;
}

function buildWorld(){
for(let y=0;y<WS;y++){
worldMap[y]=[];
tileClr[y]=[];
for(let x=0;x<WS;x++){
const cx=x-WS/2, cy=y-WS/2;
const dist=Math.sqrt(cx*cx+cy*cy)/(WS*0.46);
const n=noise(x,y);
let t=0;
if(dist>0.92)t=2;
else if(dist>0.75&&n<0.1)t=2;
else if(dist>0.62&&n<-0.6)t=2;
else if(n>0.9&&dist<0.68)t=1;
else if(dist>0.66&&dist<0.76)t=3;
worldMap[y][x]=t;
if(t===0)     tileClr[y][x]=GCLR[Math.abs(x*3+y*7)%GCLR.length];
else if(t===1)tileClr[y][x]=FCLR[Math.abs(x*5+y*3)%FCLR.length];
else if(t===2)tileClr[y][x]=WCLR[Math.abs(x*7+y*11)%WCLR.length];
else          tileClr[y][x]=SCLR[Math.abs(x*11+y*5)%SCLR.length];
}
}
worldReady=true;
spawnWilds();
spawnMega();
}

// ── SAFE HELPERS ──
function safeHex(hex){
// Ensure we always have a valid 6-char hex
if(typeof hex!==‘string’) return ‘#888888’;
const h=hex.replace(’#’,’’);
if(h.length===6) return hex;
return ‘#888888’;
}

function lighten(hex,a){
try{
const h=safeHex(hex).replace(’#’,’’);
const r=parseInt(h.slice(0,2),16)||0;
const g=parseInt(h.slice(2,4),16)||0;
const b=parseInt(h.slice(4,6),16)||0;
return ‘rgb(’+Math.min(255,r+a)+’,’+Math.min(255,g+a)+’,’+Math.min(255,b+a)+’)’;
}catch(e){ return hex||’#888’; }
}

function rr(x,y,w,h,r,fill,stroke,sw){
if(w<=0||h<=0) return;
ctx.beginPath();
ctx.moveTo(x+r,y);
ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
ctx.closePath();
if(fill){ctx.fillStyle=fill;ctx.fill();}
if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw||2;ctx.stroke();}
}

function btn(x,y,w,h,lbl,col,tcol,act,ic){
if(w<=0||h<=0) return;
const hov=G.mx>=x&&G.mx<=x+w&&G.my>=y&&G.my<=y+h;
const c=hov?lighten(col,28):col;
if(hov){ctx.shadowColor=col;ctx.shadowBlur=14;}
rr(x,y,w,h,8,c,hov?‘rgba(255,255,255,0.8)’:null,2);
ctx.shadowBlur=0;
ctx.fillStyle=tcol||’#fff’;
ctx.font=‘bold ‘+Math.max(11,Math.floor(h*0.36))+‘px Courier New’;
ctx.textAlign=‘center’;ctx.textBaseline=‘middle’;
ctx.fillText((ic?ic+’ ‘:’’)+lbl,x+w/2,y+h/2);
G.btns.push({x,y,w,h,act});
}

// FIX: hpBar now guards against zero-length gradient (WebKit crash)
function hpBar(x,y,w,h,cur,max,col,label){
if(w<=0||h<=0) return;
const pct=Math.max(0,Math.min(1,cur/Math.max(1,max)));
ctx.fillStyle=‘rgba(0,0,0,0.8)’;
ctx.fillRect(x,y,w,h);
const fillW=Math.max(1,w*pct); // never zero-width — fixes WebKit gradient crash
try{
const gc=ctx.createLinearGradient(x,y,x+fillW,y);
gc.addColorStop(0,safeHex(col));
gc.addColorStop(1,lighten(col,40));
ctx.fillStyle=gc;
}catch(e){
ctx.fillStyle=col;
}
ctx.fillRect(x,y,w*pct,h);
ctx.strokeStyle=‘rgba(255,255,255,0.3)’;ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);
if(label&&h>8){
ctx.fillStyle=’#fff’;
ctx.font=’bold ’+Math.max(8,h-3)+‘px Courier New’;
ctx.textAlign=‘center’;ctx.textBaseline=‘middle’;
ctx.fillText(label,x+w/2,y+h/2);
}
}

// ── BUCKET HAT ──
function drawBucketHat(cx,cy,sc){
const s=sc||1;
ctx.save();ctx.translate(cx,cy);
// Left horn
ctx.save();ctx.translate(-11*s,-18*s);ctx.rotate(-0.35);
try{
const hg1=ctx.createLinearGradient(0,-20*s,0,0);
hg1.addColorStop(0,’#00ffee’);hg1.addColorStop(1,’#009999’);
ctx.fillStyle=hg1;
}catch(e){ctx.fillStyle=’#00ffee’;}
ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-4*s,-22*s);ctx.lineTo(4*s,-22*s);ctx.closePath();ctx.fill();
ctx.strokeStyle=‘rgba(0,255,220,0.5)’;ctx.lineWidth=1*s;ctx.stroke();ctx.restore();
// Right horn
ctx.save();ctx.translate(11*s,-18*s);ctx.rotate(0.35);
try{
const hg2=ctx.createLinearGradient(0,-20*s,0,0);
hg2.addColorStop(0,’#00ffee’);hg2.addColorStop(1,’#009999’);
ctx.fillStyle=hg2;
}catch(e){ctx.fillStyle=’#00ffee’;}
ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-4*s,-22*s);ctx.lineTo(4*s,-22*s);ctx.closePath();ctx.fill();
ctx.strokeStyle=‘rgba(0,255,220,0.5)’;ctx.lineWidth=1*s;ctx.stroke();ctx.restore();
// Body
ctx.fillStyle=’#2a2e36’;ctx.beginPath();
ctx.moveTo(-18*s,-18*s);ctx.lineTo(18*s,-18*s);ctx.lineTo(14*s,4*s);ctx.lineTo(-14*s,4*s);ctx.closePath();ctx.fill();
// Top rim
try{
const rimG=ctx.createLinearGradient(0,-22*s,0,-16*s);
rimG.addColorStop(0,’#4a5060’);rimG.addColorStop(1,’#1e2228’);
ctx.fillStyle=rimG;
}catch(e){ctx.fillStyle=’#4a5060’;}
ctx.beginPath();ctx.ellipse(0,-18*s,20*s,4.5*s,0,0,Math.PI*2);ctx.fill();
ctx.strokeStyle=’#555d6a’;ctx.lineWidth=1.2*s;ctx.stroke();
// Bottom rim
ctx.fillStyle=’#1e2228’;ctx.beginPath();ctx.ellipse(0,4*s,14.5*s,3.5*s,0,0,Math.PI*2);ctx.fill();
// Rivet lines
ctx.strokeStyle=‘rgba(80,90,110,0.6)’;ctx.lineWidth=1*s;
for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(i*7*s,-14*s);ctx.lineTo(i*6*s,2*s);ctx.stroke();}
// AA marking
ctx.fillStyle=’#c8a820’;
ctx.font=’bold ’+(9*s)+‘px Courier New’;
ctx.textAlign=‘center’;ctx.textBaseline=‘middle’;
ctx.fillText(‘AA’,0,-8*s);
ctx.restore();
}

function spawnParticles(x,y,col,n){
for(let i=0;i<n;i++){

function drawParticles(){
G.particles=G.particles.filter(p=>p.life>0);

ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);ctx.fill();
}

}

// ── BATTLE LOGIC ──
function startBattle(ek,isBoss){
const en=DINOS[ek];
G.state=‘battle’;
Object.assign(G.battle,{
ek,ehp:en.hp,emhp:en.hp,php:G.playerHp,pmhp:pMaxHp(),
turn:‘player’,log:[isBoss?‘⚠️ BOSS: ‘+en.name+’ appears!’:‘Wild ‘+en.name+’ appeared!’],
anim:false,res:null,eshake:0,pshake:0,dnums:[],isBoss:!!isBoss
});
G.btns=[];
}

function doAttack(){
const b=G.battle;
if(b.turn!==‘player’||b.anim||b.res) return;
b.anim=true;
const dmg=Math.max(1,pAtk()+Math.floor(Math.random()*12)-6);
b.ehp=Math.max(0,b.ehp-dmg);b.eshake=20;
b.dnums.push({x:canvas.width*0.67,y:canvas.height*0.37,val:dmg,col:’#ff4444’,life:60});
b.log.unshift(‘You attack for ‘+dmg+’ dmg!’);if(b.log.length>5)b.log.pop();
spawnParticles(canvas.width*0.67,canvas.height*0.37,’#ff4444’,6);
if(b.ehp<=0){
setTimeout(()=>{
const rew=DINOS[b.ek].rw*(b.isBoss?3:1);G.wheat+=rew;
b.log.unshift(‘🪣 Won ‘+rew+’ Buckets!’);
if(!G.discovered[b.ek]){G.discovered[b.ek]=true;b.log.unshift(‘📘 ‘+DINOS[b.ek].name+’ added to Index!’);}
b.res=‘win’;b.anim=false;
spawnParticles(canvas.width*0.67,canvas.height*0.37,’#55ddff’,16);
},500);
return;
}
setTimeout(()=>{b.anim=false;b.turn=‘enemy’;enemyTurn();},520);
}

function enemyTurn(){
const b=G.battle;if(b.res) return;
b.anim=true;
const en=DINOS[b.ek];
const dmg=Math.max(1,en.atk+Math.floor(Math.random()*10)-5);
b.php=Math.max(0,b.php-dmg);G.playerHp=b.php;b.pshake=18;
b.dnums.push({x:canvas.width*0.28,y:canvas.height*0.52,val:dmg,col:’#ff8844’,life:60});
b.log.unshift(en.name+’ attacks for ‘+dmg+’!’);if(b.log.length>5)b.log.pop();
spawnParticles(canvas.width*0.28,canvas.height*0.52,’#ff8844’,6);
setTimeout(()=>{
b.anim=false;
if(b.php<=0){
const pen=Math.floor(G.wheat*0.2);G.wheat=Math.max(0,G.wheat-pen);
b.log.unshift(‘💀 Defeated! Lost ‘+pen+’ Buckets.’);b.res=‘lose’;
} else {b.turn=‘player’;}
},420);
}

function doRun(){
const b=G.battle;if(b.res||b.anim) return;
if(Math.random()<0.62){b.log.unshift(‘Got away safely!’);setTimeout(exitBattle,500);}
else{b.log.unshift(“Can’t escape!”);b.turn=‘enemy’;setTimeout(enemyTurn,350);}
}

function exitBattle(){
G.state=‘world’;
G.playerHp=G.battle.res===‘lose’?pMaxHp():Math.max(5,G.battle.php);
G.encCd=200;G.btns=[];
}

btn(W-84,8,76,32,‘✕ Close’,’#4a2010’,’#fff’,()=>{G.state=‘world’;G.btns=[];});
}

// ── SHOP ──
function drawShop(){
G.btns=[];
const W=canvas.width,H=canvas.height;
ctx.fillStyle=’#0a0602’;ctx.fillRect(0,0,W,H);
ctx.fillStyle=‘rgba(60,30,0,0.95)’;ctx.fillRect(0,0,W,52);
ctx.fillStyle=’#ffd700’;ctx.font=‘bold 22px Courier New’;
ctx.textAlign=‘center’;ctx.textBaseline=‘middle’;ctx.fillText(‘🛒 DINO SHOP’,W/2,26);
ctx.fillStyle=’#aaddff’;ctx.font=‘bold 16px Courier New’;ctx.textAlign=‘left’;
ctx.fillText(’🪣 ’+G.wheat,14,26);

const upgs=[
{k:‘hp’, label:‘HP Boost’,  desc:’+20 Max HP’,  icon:‘❤️’,base:25,col:’#aa2222’},
{k:‘atk’,label:‘Atk Power’, desc:’+8 Attack’,   icon:‘⚔️’,base:30,col:’#aa6622’},
{k:‘spd’,label:‘Speed Up’,  desc:’+0.5 Speed’,  icon:‘⚡’,base:20,col:’#2244aa’}
];
const cw2=Math.min(220,Math.floor((W-50)/3));
const ch=220, tw=upgs.length*cw2+(upgs.length-1)*14, sx2=(W-tw)/2;

upgs.forEach((upg,i)=>{
const lv=G.player.upg[upg.k], cost=upg.base+lv*15, can=G.wheat>=cost;
const x=sx2+i*(cw2+14), y=62;
rr(x,y,cw2,ch,10,‘rgba(18,10,4,0.97)’,can?upg.col:’#2a2020’,2);
ctx.font=‘32px sans-serif’;ctx.textAlign=‘center’;ctx.textBaseline=‘top’;ctx.fillText(upg.icon,x+cw2/2,y+12);
ctx.fillStyle=’#fff’;ctx.font=‘bold 14px Courier New’;ctx.textBaseline=‘top’;ctx.fillText(upg.label,x+cw2/2,y+56);
ctx.fillStyle=’#ffd700’;ctx.font=‘bold 12px Courier New’;ctx.fillText(‘Lv ‘+lv,x+cw2/2,y+76);
ctx.fillStyle=’#aaa’;ctx.font=‘11px Courier New’;ctx.fillText(upg.desc,x+cw2/2,y+96);
ctx.fillStyle=can?’#aaddff’:’#664422’;ctx.font=‘bold 12px Courier New’;
ctx.fillText(‘Cost: 🪣 ‘+cost,x+cw2/2,y+116);
btn(x+14,y+140,cw2-28,38,‘UPGRADE’,can?upg.col:’#2a2020’,can?’#fff’:’#665’,()=>{
if(G.wheat>=cost){G.wheat-=cost;G.player.upg[upg.k]++;if(upg.k===‘hp’)G.playerHp+=20;
spawnParticles(x+cw2/2,y+159,’#55ccff’,10);}
});
for(let l=0;l<Math.min(lv,8);l++){
ctx.fillStyle=upg.col;ctx.beginPath();ctx.arc(x+12+l*12,y+ch-10,3.5,0,Math.PI*2);ctx.fill();
}
});

const hy=62+ch+16, hcost=12, hcan=G.wheat>=hcost&&G.playerHp<pMaxHp();
const hw=Math.min(300,W-50), hx=(W-hw)/2;
rr(hx,hy,hw,72,8,‘rgba(0,30,0,0.95)’,hcan?’#44aa44’:’#1a2a1a’,2);
ctx.font=‘22px sans-serif’;ctx.textAlign=‘center’;ctx.textBaseline=‘top’;ctx.fillText(‘💊’,hx+hw/2,hy+8);
ctx.fillStyle=’#aaffaa’;ctx.font=‘bold 13px Courier New’;ctx.fillText(‘Full Heal’,hx+hw/2,hy+36);
ctx.fillStyle=’#aaddff’;ctx.font=‘12px Courier New’;ctx.fillText(‘Cost: 🪣 ‘+hcost,hx+hw/2,hy+54);
if(hcan) btn(hx,hy,hw,72,’’,‘rgba(0,0,0,0.01)’,‘rgba(0,0,0,0)’,()=>{
if(G.wheat>=hcost&&G.playerHp<pMaxHp()){G.wheat-=hcost;G.playerHp=pMaxHp();spawnParticles(W/2,H/2,’#44ff44’,14);}
});
btn(W-84,8,76,32,‘✕ Close’,’#4a2010’,’#fff’,()=>{G.state=‘world’;G.btns=[];});
}

// ── SPAWN ──
function spawnWilds(){
const keys=Object.keys(DINOS).filter(k=>k!==‘megalodon’);
for(let i=0;i<30;i++){
let chosen=‘raptor’,acc=0;
const rng=Math.random();
for(const k of keys){acc+=DINOS[k].sp;if(rng<acc){chosen=k;break;}}
for(let att=0;att<30;att++){
const tx=Math.floor(Math.random()*WS),ty=Math.floor(Math.random()*WS);
if(worldMap[ty]&&worldMap[ty][tx]!==2){
G.wilds.push({key:chosen,x:tx*TS+TS/2,y:ty*TS+TS/2,anim:0,mt:Math.random()*90,dx:0,dy:0,face:1,isBoss:false});
break;
}
}
}
}

function spawnMega(){
for(let att=0;att<400;att++){
const tx=Math.floor(Math.random()*WS),ty=Math.floor(Math.random()*WS);
if(worldMap[ty]&&worldMap[ty][tx]===2){
G.wilds.push({key:‘megalodon’,x:tx*TS+TS/2,y:ty*TS+TS/2,anim:0,mt:0,dx:0,dy:0,face:1,isBoss:true});
return;
}
}
}

// ── UPDATE ──
function update(){
G.tick++;
if(G.encCd>0) G.encCd–;

if(G.state===‘loading’){
G.loadPct=Math.min(1,G.loadPct+0.04);
if(G.loadPct>=1&&!worldReady){
buildWorld();
G.state=‘intro’;
G.playerHp=pMaxHp();
}
return;
}

if(G.state===‘world’) updateWorld();
else if(G.state===‘battle’) updateBattle();

G.particles=G.particles.filter(p=>p.life>0);
G.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life–;});
}

function updateWorld(){
const p=G.player;
let dx=0,dy=0;
const spd=pSpd();
if(G.keys[‘ArrowLeft’]||G.keys[‘a’])  dx-=spd;
if(G.keys[‘ArrowRight’]||G.keys[‘d’]) dx+=spd;
if(G.keys[‘ArrowUp’]||G.keys[‘w’])    dy-=spd;
if(G.keys[‘ArrowDown’]||G.keys[‘s’])  dy+=spd;
if(G.joy.on){
const jl=Math.sqrt(G.joy.dx*G.joy.dx+G.joy.dy*G.joy.dy);
if(jl>12){dx+=(G.joy.dx/jl)*spd;dy+=(G.joy.dy/jl)*spd;}
}
if(dx&&dy){dx*=0.707;dy*=0.707;}

const nx=p.x+dx, ny=p.y+dy;
const ttx=Math.floor(nx/TS), tty=Math.floor(ny/TS);
const canSwim=[‘spinosaurus’,‘pterodactyl’,‘megalodon’].includes(p.dk);
if(ttx>=0&&tty>=0&&ttx<WS&&tty<WS){
if(worldMap[tty][ttx]!==2||canSwim){p.x=nx;p.y=ny;}
}
p.x=Math.max(TS,Math.min((WS-1)*TS,p.x));
p.y=Math.max(TS,Math.min((WS-1)*TS,p.y));
p.moving=!!(dx||dy);
if(p.moving){p.anim++;if(dx>0)p.face=1;else if(dx<0)p.face=-1;}

const camTx=p.x-canvas.width/2, camTy=p.y-canvas.height/2;
G.cam.x+=(camTx-G.cam.x)*LERP;
G.cam.y+=(camTy-G.cam.y)*LERP;
G.cam.x=Math.max(0,Math.min(WS*TS-canvas.width,G.cam.x));
G.cam.y=Math.max(0,Math.min(WS*TS-canvas.height,G.cam.y));

for(const w of G.wilds){
w.mt–;
if(w.mt<=0){
w.mt=50+Math.random()*100;
const a=Math.random()*Math.PI*2,wsp=DINOS[w.key].spd*0.4;
w.dx=Math.cos(a)*wsp;w.dy=Math.sin(a)*wsp;
}
w.x+=w.dx;w.y+=w.dy;
if(w.dx!==0) w.face=w.dx>0?1:-1;
w.x=Math.max(TS,Math.min((WS-1)*TS,w.x));
w.y=Math.max(TS,Math.min((WS-1)*TS,w.y));
w.anim++;
}

if(G.encCd<=0){
for(let i=0;i<G.wilds.length;i++){
const w=G.wilds[i];
if(Math.hypot(p.x-w.x,p.y-w.y)<38+DINOS[w.key].sz){
const wasBoss=w.isBoss;
G.wilds.splice(i,1);
startBattle(w.key,wasBoss);
if(wasBoss) setTimeout(spawnMega,90000);
else setTimeout(()=>{
let ch=‘raptor’,ac2=0;
const r2=Math.random();
const ks2=Object.keys(DINOS).filter(k=>k!==‘megalodon’);
for(const k of ks2){ac2+=DINOS[k].sp;if(r2<ac2){ch=k;break;}}
for(let att=0;att<20;att++){
const tx2=Math.floor(Math.random()*WS),ty2=Math.floor(Math.random()*WS);
if(worldMap[ty2]&&worldMap[ty2][tx2]!==2){
G.wilds.push({key:ch,x:tx2*TS+TS/2,y:ty2*TS+TS/2,anim:0,mt:60,dx:0,dy:0,face:1,isBoss:false});
break;
}
}
},5000);
break;
}
}
}
}

function updateBattle(){
const b=G.battle;
if(b.eshake>0) b.eshake–;
if(b.pshake>0) b.pshake–;
b.dnums=b.dnums.filter(dn=>{dn.life–;return dn.life>0;});
}

// ── RENDER ──
function render(){
ctx.clearRect(0,0,canvas.width,canvas.height);
if(G.state===‘loading’){ drawLoading(); return; }
if(G.state===‘intro’){   drawIntro();   return; }
if(G.state===‘world’){
drawWorld();drawWilds();drawPlayer();drawParticles();drawHUD();
if(G.joy.on){
const jx=G.joy.sx,jy=G.joy.sy;
ctx.fillStyle=‘rgba(255,255,255,0.12)’;ctx.beginPath();ctx.arc(jx,jy,52,0,Math.PI*2);ctx.fill();
ctx.strokeStyle=‘rgba(255,255,255,0.4)’;ctx.lineWidth=2;ctx.beginPath();ctx.arc(jx,jy,52,0,Math.PI*2);ctx.stroke();
const jl=Math.min(42,Math.hypot(G.joy.dx,G.joy.dy));
const ja=Math.atan2(G.joy.dy,G.joy.dx);
ctx.fillStyle=‘rgba(255,255,255,0.32)’;ctx.beginPath();
ctx.arc(jx+Math.cos(ja)*jl,jy+Math.sin(ja)*jl,26,0,Math.PI*2);ctx.fill();
}
} else if(G.state===‘battle’){ drawBattle();drawParticles(); }
else if(G.state===‘index’){    drawIndex(); }
else if(G.state===‘shop’){     drawShop();drawParticles(); }
}

// ── INPUT ──
window.addEventListener(‘keydown’,e=>{
G.keys[e.key]=true;
if(G.state===‘intro’) G.state=‘world’;
});
window.addEventListener(‘keyup’,e=>{
G.keys[e.key]=false;
});

canvas.addEventListener(‘click’,e=>{
const r=canvas.getBoundingClientRect();
const cx=e.clientX-r.left, cy=e.clientY-r.top;
if(G.state===‘intro’){G.state=‘world’;return;}
if(G.state===‘loading’) return;
for(const b of G.btns){if(cx>=b.x&&cx<=b.x+b.w&&cy>=b.y&&cy<=b.y+b.h){b.act();return;}}
});

canvas.addEventListener(‘touchstart’,e=>{
e.preventDefault();
const r=canvas.getBoundingClientRect();
const t=e.touches[0];
const tx=t.clientX-r.left, ty=t.clientY-r.top;
if(G.state===‘loading’) return;
if(G.state===‘intro’){G.state=‘world’;return;}
for(const b of G.btns){if(tx>=b.x&&tx<=b.x+b.w&&ty>=b.y&&ty<=b.y+b.h){b.act();return;}}
if(G.state===‘world’){G.joy.on=true;G.joy.sx=tx;G.joy.sy=ty;G.joy.dx=0;G.joy.dy=0;}
},{passive:false});

canvas.addEventListener(‘touchmove’,e=>{
e.preventDefault();
if(!G.joy.on) return;
const r=canvas.getBoundingClientRect();const t=e.touches[0];
G.joy.dx=t.clientX-r.left-G.joy.sx;
G.joy.dy=t.clientY-r.top-G.joy.sy;
},{passive:false});

canvas.addEventListener(‘touchend’,e=>{
e.preventDefault();
G.joy.on=false;G.joy.dx=0;G.joy.dy=0;
},{passive:false});

// ── LOOP ──
function loop(){
try{ update(); render(); }
catch(e){ console.error(‘Game error:’,e); }
requestAnimationFrame(loop);
}
loop();
</script>
